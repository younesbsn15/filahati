<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - فلاحتي</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">فلاح<span>تي</span></a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">الرئيسية</a>
                <a href="jobs.html" class="nav-link">الوظائف</a>
                <a href="#" class="nav-link">عن المنصة</a>
                <a href="#" class="nav-link">اتصل بنا</a>
            </nav>
        </div>
    </header>

    <!-- Login Form -->
    <div class="form-container">
        <h1 class="form-title">تسجيل الدخول</h1>
        
        <form action="dashboard-farmer.html">
            <div class="form-group">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" class="form-input" placeholder="example@email.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <input type="password" class="form-input" placeholder="********" required>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <label style="display: flex; align-items: center; gap: 5px; color: #757575;">
                    <input type="checkbox"> تذكرني
                </label>
                <a href="#" style="color: #2E7D32; text-decoration: none;">نسيت كلمة المرور؟</a>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">دخول</button>
            
            <p style="text-align: center; color: #757575;">
                ليس لديك حساب؟ 
                <a href="register.html" style="color: #2E7D32; font-weight: 600; text-decoration: none;">إنشاء حساب جديد</a>
            </p>
        </form>
